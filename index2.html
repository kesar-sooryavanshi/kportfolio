<!DOCTYPE html>
<html>
<head>
  <title>EdPath AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b, #020617);
      color: white;
    }

    /* HEADER */
    .header {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-weight: bold;
      font-size: 18px;
      text-align: center;
    }

    /* MAIN */
    .container {
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 25px;
      font-size: 14px;
    }

    /* INPUT */
    .input-box {
      display: flex;
      background: rgba(30,41,59,0.8);
      backdrop-filter: blur(10px);
      padding: 10px;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
      padding: 8px;
    }

    button {
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* SUGGESTIONS */
    .suggestions {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: rgba(30,41,59,0.7);
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      background: rgba(51,65,85,0.9);
      transform: translateY(-3px);
    }

    /* GLOW */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #6366f1;
      filter: blur(100px);
      opacity: 0.2;
      top: 20%;
      left: 30%;
      z-index: -1;
    }

    /* 📱 MOBILE OPTIMIZATION */
    @media (max-width: 600px) {
      h1 {
        font-size: 26px;
      }

      .input-box {
        flex-direction: column;
        gap: 8px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="header">🎓 EdPath AI</div>

  <div class="glow"></div>

  <div class="container">
    <h1>Ask Anything. Learn Everything.</h1>
    <p>Your AI Learning Partner</p>

    <div class="input-box">
      <input id="input" placeholder="Ask anything..." />
      <button onclick="send()">Send</button>
    </div>

    <div class="suggestions">
      <div class="card" onclick="fill('Explain JavaScript simply')">Explain JavaScript</div>
      <div class="card" onclick="fill('Create AI roadmap')">AI roadmap</div>
      <div class="card" onclick="fill('Learn coding step by step')">Learn coding</div>
      <div class="card" onclick="fill('Web development path')">Web dev path</div>
    </div>
  </div>

  <script>
    function fill(text) {
      document.getElementById("input").value = text;
    }

    function send() {
      const value = document.getElementById("input").value;
      if (!value) return;

      alert("Next: Chat UI banega (Step 2)");
    }
  </script>

</body>
</html>
