<!DOCTYPE html>
<html>
<head>
  <title>EdPath AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b, #020617);
      color: white;
    }

    .header {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin-bottom: 10px;
    }

    .user {
      text-align: right;
    }

    .ai {
      text-align: left;
      color: #c7d2fe;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: transparent;
      color: white;
    }

    button {
      background: #6366f1;
      border: none;
      padding: 10px 15px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="header">🎓 EdPath AI</div>

  <div class="container">
    
    <div class="chat" id="chat"></div>

    <div class="input-box">
      <input id="input" placeholder="Ask anything..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

  <script>
    function send() {
      const input = document.getElementById("input");
      const chat = document.getElementById("chat");

      const text = input.value.trim();
      if (!text) return;

      // user message
      chat.innerHTML += `<div class="msg user">You: ${text}</div>`;

      // fake AI logic
      let reply = "I am demo AI 🤖";

      if (text.toLowerCase().includes("hello")) {
        reply = "Hi 👋 How can I help you?";
      } 
      else if (text.toLowerCase().includes("ai")) {
        reply = "AI means Artificial Intelligence.";
      } 
      else if (text.toLowerCase().includes("coding")) {
        reply = "Start with HTML, CSS, JavaScript 🚀";
      }

      // delay for realism
      setTimeout(() => {
        chat.innerHTML += `<div class="msg ai">AI: ${reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
      }, 500);

      input.value = "";
    }
  </script>

</body>
</html>
