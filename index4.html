<!DOCTYPE html>
<html>
<head>
  <title>EdPath AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b, #020617);
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-weight: bold;
    }

    .menu {
      opacity: 0.7;
      font-size: 14px;
    }

    /* CENTER */
    .container {
      height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    /* INPUT */
    .input-box {
      display: flex;
      width: 100%;
      max-width: 550px;
      background: rgba(30,41,59,0.7);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
    }

    button {
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    /* SUGGESTIONS */
    .suggestions {
      margin-top: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
      gap: 12px;
      width: 100%;
      max-width: 550px;
    }

    .card {
      background: rgba(30,41,59,0.7);
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      transform: translateY(-4px);
      background: rgba(51,65,85,0.9);
    }

    /* FOOTER TEXT */
    .footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #64748b;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      h1 {
        font-size: 26px;
      }

      .input-box {
        flex-direction: column;
        gap: 8px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">🎓 EdPath AI</div>
    <div class="menu">Explore | Features</div>
  </div>

  <!-- MAIN -->
  <div class="container">
    <h1>Ask Anything. Learn Everything.</h1>
    <p>Your personal AI learning assistant</p>

    <div class="input-box">
      <input id="input" placeholder="Ask anything..." />
      <button onclick="send()">Send</button>
    </div>

    <div class="suggestions">
      <div class="card" onclick="fill('Explain AI simply')">Explain AI</div>
      <div class="card" onclick="fill('Create coding roadmap')">Coding roadmap</div>
      <div class="card" onclick="fill('Learn web development')">Web dev</div>
      <div class="card" onclick="fill('Best career in tech')">Tech career</div>
    </div>
  </div>

  <div class="footer">
    Built like a modern AI platform 🚀
  </div>

  <script>
    function fill(text) {
      document.getElementById("input").value = text;
    }

    function send() {
      const value = document.getElementById("input").value;
      if (!value) return;

      alert("Next step: Chat screen banega 🔥");
    }
  </script>

</body>
</html>
